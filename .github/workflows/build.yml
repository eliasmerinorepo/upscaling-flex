name: Build App

on:
  push:
    branches: [main, master]
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: Upscaling-IA-macOS
          - os: windows-latest
            artifact: Upscaling-IA-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build app (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller "Upscaling IA.spec"

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller "Upscaling IA.spec"

      - name: Zip .app bundle (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Upscaling IA.app" "Upscaling-IA.zip"

      - name: Zip folder (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist\Upscaling IA" -DestinationPath "Upscaling-IA.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Upscaling-IA.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Upscaling-IA.zip
